<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LotusFx - Nifty 50 Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        .matrix-table th { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px; text-align: left; font-size: 0.8rem; color: #8b949e; }
        .matrix-table td { border-bottom: 1px solid #21262d; padding: 8px 12px; font-size: 0.85rem; }
        .badge { padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 0.7rem; }
        .bull { background: rgba(63, 185, 80, 0.2); color: #3fb950; }
        .bear { background: rgba(248, 81, 73, 0.2); color: #f85149; }
    </style>
</head>
<body>
    <div class="p-4">
        <h2 class="text-xl font-bold mb-4">NIFTY 50 - INTRADAY AERIAL VIEW</h2>
        <table class="matrix-table w-full border border-gray-800">
            <thead>
                <tr>
                    <th>STOCK</th>
                    <th>INTRADAY SPARKLINE</th>
                    <th>D1</th>
                    <th>H1</th>
                    <th>15M</th>
                    <th>SIGNAL</th>
                </tr>
            </thead>
            <tbody id="nifty-body"></tbody>
        </table>
    </div>

    <script>
        // Nifty 50 Symbols List
        const symbols = [
            "ADANIENT", "ADANIPORTS", "APOLLOHOSP", "ASIANPAINT", "AXISBANK", "BAJAJ-AUTO", "BAJFINANCE", "BAJAJFINSV", "BPCL", "BHARTIARTL", 
            "BRITANNIA", "CIPLA", "COALINDIA", "DIVISLAB", "DRREDDY", "EICHERMOT", "GRASIM", "HCLTECH", "HDFCBANK", "HDFCLIFE", 
            "HEROMOTOCO", "HINDALCO", "HINDUNILVR", "ICICIBANK", "ITC", "INDUSINDBK", "INFY", "JSWSTEEL", "KOTAKBANK", "LT", 
            "LTIM", "M&M", "MARUTI", "NTPC", "NESTLEIND", "ONGC", "POWERGRID", "RELIANCE", "SBILIFE", "SBIN", 
            "SUNPHARMA", "TATACONSUM", "TATAMOTORS", "TATASTEEL", "TCS", "TECHM", "TITAN", "ULTRACEMCO", "UPL", "WIPRO"
        ];

        const tbody = document.getElementById('nifty-body');

        symbols.forEach(sym => {
            const row = document.createElement('tr');
            // Generating dummy trends for sparklines (Real API data can replace this)
            const trend = Array.from({length: 10}, () => Math.floor(Math.random() * 100));
            const isUp = trend[0] < trend[9];

            row.innerHTML = `
                <td class="font-bold">${sym}</td>
                <td><div id="spark-${sym}"></div></td>
                <td><span class="badge ${isUp ? 'bull' : 'bear'}">${isUp ? 'BULL' : 'BEAR'}</span></td>
                <td><span class="badge ${Math.random() > 0.5 ? 'bull' : 'bear'}">OK</span></td>
                <td><span class="badge bull">BUY</span></td>
                <td class="text-xs text-gray-400">TRENDING</td>
            `;
            tbody.appendChild(row);

            new ApexCharts(document.querySelector(`#spark-${sym}`), {
                series: [{ data: trend }],
                chart: { type: 'line', width: 120, height: 30, sparkline: { enabled: true } },
                stroke: { curve: 'smooth', width: 2 },
                colors: [isUp ? '#3fb950' : '#f85149']
            }).render();
        });
    </script>
</body>
</html>
